AllCops:
  TargetRubyVersion: 4.0
  NewCops: enable

# These cops don't fit the scripting style of AoC solutions
Style/GlobalVars:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Naming/MethodParameterName:
  Enabled: false

Style/CaseEquality:
  Enabled: false

Lint/AmbiguousOperatorPrecedence:
  Enabled: false

Naming/PredicateMethod:
  Enabled: false

Naming/PredicatePrefix:
  Enabled: false

Lint/EmptyBlock:
  Enabled: false
